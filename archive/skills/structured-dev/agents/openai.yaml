interface:
  display_name: "structured-dev"
  short_description: "Generate change briefs, choose workflow depth, and enforce validation gates."
  default_prompt: "Use $structured-dev to generate a change brief or task-intake package, choose light vs full workflow, protect existing user changes, and deliver the task with explicit review and minimal-sufficient verification gates. Use task-intake only to combine project facts, plan, validation candidates, risks, and open questions; do not treat it as implementation or executed validation. For reference-driven porting requests, read references/reference-porting.md and compare upstream behavior, hot paths, data structures, and local differences before implementing. Chain $git-delivery for stage/commit/push handoff and $skill-repo-lifecycle for repo-owned Skill or install-copy maintenance. When invoking bundled helpers, derive <skill_root> only from the opened SKILL.md path, confirm referenced run.py/scripts/references exist under that root, and call <python_cmd> <skill_root>/run.py ... with the available Python launcher (`py -3`, `python`, or `python3`)."
