interface:
  display_name: "git-delivery"
  short_description: "Close out Git changes with validation and safe push checks"
  default_prompt: "Use $git-delivery when the user asks to commit, push, stage, publish, or close out repository changes. Inspect the full worktree first, separate source changes from generated/system/diagnostic artifacts, run lightweight integrity checks such as git diff --check and git diff --cached --check, verify the branch and remote sync state, and re-check status after commit or push. Derive <skill_root> only from the opened SKILL.md path, confirm bundled run.py/scripts/references exist, and invoke helpers through <python_cmd> <skill_root>/run.py ... with the available Python launcher."
