interface:
  display_name: "harmony-build"
  short_description: "Help with macOS HarmonyOS/OpenHarmony hvigor environment checks and verification"
  default_prompt: "Use $harmony-build for a macOS HarmonyOS/OpenHarmony development environment when the user needs local hvigor readiness, task verification, package/install verification, or troubleshooting around Node, Java, Harmony SDK, DevEco Studio, ohpm, hdc, or the project hvigor wrapper. Always pass --repo as the Harmony project root, such as /Users/bill/WorkSpace/AnyChat/harmony for AnyChat, not the outer business repository. Reuse cached ready baselines, do not rerun detect mechanically, and do not compile for small non-build-affecting edits when cheaper minimal validation is sufficient. Detect preflight defaults to a bounded hvigor tasks timeout, supports detect --timeout-seconds, and non-JSON detect prints preflight progress before waiting. When build verification is needed and the exact public task is unclear, use run.py build; it must run the bare assembleHap task directly, must not list hvigor tasks to choose a task, and must not infer module task names such as :entry:assembleHap. When the public task is already known, use verify --task <task>; verify requires --task. For device install of test artifacts, use run.py install-hap --repo <harmony-project-root> so the skill automatically selects the newest signed .hap artifact under that root; do not require passing --hap for normal assembleHap output, do not install unsigned .hap artifacts, and do not drift to signedApp unless the user explicitly asks for App-level packaging. Use verify --task tasks only when the user explicitly asks for task listing or when you are troubleshooting hvigor or environment drift, and never use it to seed a ready baseline. Do not pass internal .hvigor task keys such as :entry:default@CompileArkTS, do not default to assembleApp when a smaller hvigor task can justify the claim, and invoke Python helpers through <python_cmd> <skill_root>/run.py with the available Python launcher (`py -3`, `python`, or `python3`) after deriving <skill_root> only from the opened SKILL.md path and confirming referenced attachments exist."
