interface:
  display_name: "harmony-build"
  short_description: "Help with macOS HarmonyOS/OpenHarmony hvigor environment checks and verification"
  default_prompt: "Use $harmony-build for a macOS HarmonyOS/OpenHarmony development environment when the user needs local hvigor readiness, task verification, or troubleshooting around Node, Java, Harmony SDK, DevEco Studio, ohpm, hdc, or the project hvigor wrapper. Reuse cached ready baselines, do not rerun detect mechanically, and do not compile for small non-build-affecting edits when cheaper minimal validation is sufficient. Detect preflight defaults to a bounded hvigor tasks timeout, supports detect --timeout-seconds, and non-JSON detect prints preflight progress before waiting. When build verification is needed and the exact public task is unclear, use run.py build so the skill can choose and run the build task, apply a total build-flow hvigor wait budget, parse complete successful tasks output for task selection, and return the final phase/task/result; successful build output should stay compact and should not repeat hvigor logs, while failed builds should include the useful error tail. When the public task is already known, use verify --task <task>; verify requires --task. Use verify --task tasks only when the user explicitly asks for task listing or when you are troubleshooting hvigor or environment drift, and never use it to seed a ready baseline. Do not pass internal .hvigor task keys such as :entry:default@CompileArkTS, do not default to assembleApp when a smaller hvigor task can justify the claim, and invoke Python helpers through <python_cmd> <skill_root>/run.py with the available Python launcher (`py -3`, `python`, or `python3`) after deriving <skill_root> only from the opened SKILL.md path and confirming referenced attachments exist."
