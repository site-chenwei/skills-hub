interface:
  display_name: "project-onboarding"
  short_description: "Scan repo facts, stack signals, and validation paths before risky work."
  default_prompt: "Use $project-onboarding to scan repository facts, confirm scope, identify safety risks, and find the smallest valid verification path before changing code. The onboard helper is an alias for project_facts and is useful as a high-level entry name. When invoking bundled helpers, derive <skill_root> only from the opened SKILL.md path, confirm referenced run.py/scripts/references exist under that root, and call <python_cmd> <skill_root>/run.py ... with the available Python launcher (`py -3`, `python`, or `python3`), never guess a .system install path."
