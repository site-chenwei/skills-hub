interface:
  display_name: "docs-hub"
  short_description: "资料查询默认先走本地 DocsHub，支持初始化、lookup、status 与刷新"
  default_prompt: "Use $docs-hub as the mandatory first step for documentation and factual lookups; query the local DocsHub before answering or falling back to memory/web unless the hub is unavailable, yields no useful result after refinement, or the user explicitly requests online-latest information. Use `catalog`/`list` only for concise docset discovery, then use targeted `lookup` for source evidence. For automation prefer `lookup`, whose JSON output contains `ok`, `partial`, `failed`, `results`, `catalog_hints`, and `failed_docsets`; never treat an empty `results` list as no-match until `failed_docsets` is empty. Use `status`/`doctor` for quick init, hub root, docset, and index checks without rebuilding. For DocsHub content publishing, validate docsets.json, Markdown hygiene, source/provenance, secrets, and optional lookup smoke instead of inventing app build tests. When invoking bundled helpers, derive <skill_root> only from the opened SKILL.md path, confirm referenced run.py/scripts/references exist under that root, and call <python_cmd> <skill_root>/run.py ... with the available Python launcher (`py -3`, `python`, or `python3`)."

policy:
  allow_implicit_invocation: true
