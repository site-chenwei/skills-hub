interface:
  display_name: "code-review-checklist"
  short_description: "Scope diffs, rank findings, and call out regression and test risks."
  default_prompt: "Use $code-review-checklist to scope the diff first, then report evidence-backed findings, severity, and test gaps. When invoking bundled helpers, derive <skill_root> from the opened SKILL.md path and call <python_cmd> <skill_root>/run.py ... with the available Python launcher (`py -3`, `python`, or `python3`)."
