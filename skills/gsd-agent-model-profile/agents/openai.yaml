interface:
  display_name: "gsd-agent-model-profile"
  short_description: "Restore GSD standalone agent TOML files to gpt-5.5 with fixed reasoning tiers"
  default_prompt: "Use $gsd-agent-model-profile when the user wants to configure or verify GSD custom sub-agent model profiles, restore agent model settings after a GSD update overwrites ~/.codex/agents, or discusses standalone agent TOML files, model_reasoning_effort, gpt-5.5, medium, high, or xhigh tiers. Confirm the script attachment exists under the opened skill root, then run scripts/apply-gsd-agent-model-profile.sh or python3 run.py with apply, dry-run, or verify. Write model fields only into standalone agent files under $CODEX_HOME/agents or ~/.codex/agents, never into config.toml registry [agents.*] blocks. Use --dry-run and fixture directories for validation unless the user explicitly asks to modify the real agents directory."
