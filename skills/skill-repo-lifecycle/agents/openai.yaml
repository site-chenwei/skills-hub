interface:
  display_name: "skill-repo-lifecycle"
  short_description: "Maintain skill repos, tests, installs, and AGENTS boundaries"
  default_prompt: "Use $skill-repo-lifecycle when maintaining repo-owned Codex skills, especially skills-hub. Confirm the active skills/*/SKILL.md inventory and archive/skills/*/SKILL.md inventory, keep active SKILL.md/run.py/scripts/references/tests/agents metadata consistent, run aggregate tests, preserve user-level AGENTS downshift boundaries, and synchronize only active repo-owned skills to the local install directory with parity and smoke checks. Treat archived skills that still exist in the install directory as hygiene risks to report, not active capabilities to sync. When invoking bundled helpers, derive <skill_root> only from the opened SKILL.md path, confirm referenced run.py/scripts/references exist under that root, and call <python_cmd> <skill_root>/run.py ... with the available Python launcher (`py -3`, `python`, or `python3`)."
